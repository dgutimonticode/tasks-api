name: CD - Build, Push and Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Construir imagen y subirla a Docker Hub ──
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/tasks-api:latest
            ${{ secrets.DOCKER_USERNAME }}/tasks-api:${{ github.sha }}

      - name: Escaneo de vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/tasks-api:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ── Job 2: Desplegar en staging ─────────────────────
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Desplegar en staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKER_USERNAME }}/tasks-api:latest"

            # 1. Descargar nueva imagen
            docker pull $IMAGE

            # 2. Levantar en puerto alterno para validar
            docker run -d \
              --name tasks-api-new \
              --restart unless-stopped \
              -p 3001:3000 \
              $IMAGE

            # 3. Esperar que inicialice
            sleep 5

            # 4. Health check
            if curl -sf http://localhost:3001/health; then
              echo "✅ Health check exitoso en staging"
              docker stop tasks-api || true
              docker rm tasks-api || true
              docker run -d \
                --name tasks-api \
                --restart unless-stopped \
                -p 80:3000 \
                $IMAGE
              docker rm -f tasks-api-new || true
            else
              echo "❌ Health check fallido en staging"
              docker rm -f tasks-api-new || true
              exit 1
            fi

            docker system prune -f

  # ── Job 3: Desplegar en production ──────────────────
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Desplegar en produccion
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKER_USERNAME }}/tasks-api:${{ github.sha }}"

            echo "🚀 Desplegando version ${{ github.sha }} en produccion"
            docker pull $IMAGE
            docker stop tasks-api || true
            docker rm tasks-api || true
            docker run -d \
              --name tasks-api \
              --restart unless-stopped \
              -p 80:3000 \
              $IMAGE

            docker system prune -f
            echo "✅ Despliegue en produccion completado"
